<div class="glass-card overflow-hidden group flex flex-col h-full transform transition-all duration-300 hover:-translate-y-1 hover:shadow-2xl">
  <div class="relative h-48 w-full overflow-hidden bg-gray-200 dark:bg-gray-800">
    <!-- Placeholder or Image -->
    <div *ngIf="!food.image" class="absolute inset-0 flex items-center justify-center text-gray-400">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
    </div>
    <img *ngIf="food.image" [src]="food.image" [alt]="food.name" class="object-cover w-full h-full transform transition-transform duration-500 group-hover:scale-110">
    
    <!-- Tags -->
    <div class="absolute top-3 left-3 flex flex-col gap-2">
      <span *ngIf="food.isSpecial" class="px-2.5 py-1 text-xs font-bold bg-gradient-to-r from-orange-400 to-red-500 text-white rounded-md shadow-md backdrop-blur-md">Special</span>
      <span *ngIf="food.offer && food.offer > 0" class="px-2.5 py-1 text-xs font-bold bg-gradient-to-r from-green-400 to-emerald-500 text-white rounded-md shadow-md backdrop-blur-md">{{ food.offer }}% OFF</span>
    </div>
  </div>

  <div class="p-5 flex-1 flex flex-col">
    <div class="flex justify-between items-start mb-2">
      <div>
        <div class="flex items-center flex-wrap gap-2 mb-1">
          <span class="text-xs font-medium text-indigo-500 dark:text-indigo-400 uppercase tracking-wider">{{ food.category }}</span>
          <div *ngIf="food.tags && food.tags.length > 0" class="flex flex-wrap gap-1">
            <span *ngFor="let tag of food.tags" class="text-[10px] px-1.5 py-0.5 rounded-md bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 font-bold"
                  [ngClass]="{
                    'text-green-600 dark:text-green-400 bg-green-50 dark:bg-green-900/30': tag === 'Veg',
                    'text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/30': tag === 'Non-Veg',
                    'text-orange-600 dark:text-orange-400 bg-orange-50 dark:bg-orange-900/30': tag === 'Spicy',
                    'text-amber-600 dark:text-amber-400 bg-amber-50 dark:bg-amber-900/30': tag === 'Gluten-Free',
                    'text-white bg-gradient-to-r from-orange-400 to-red-500 shadow-sm': tag === 'Combo'
                  }">
              {{ tag }}
            </span>
          </div>
        </div>
        <h3 class="text-lg font-bold text-gray-900 dark:text-white leading-tight">{{ food.name }}</h3>
      </div>
      <span class="text-xl font-black text-gray-900 dark:text-white">₹{{ food.price | number:'1.2-2' }}</span>
    </div>

    <div class="mt-auto pt-4 flex items-center justify-between">
      <span class="text-sm font-medium" [ngClass]="food.stock > 0 ? 'text-green-500' : 'text-red-500'">
        {{ food.stock > 0 ? 'In Stock' : 'Out of Stock' }}
      </span>
      <button (click)="onAdd()" 
              [disabled]="food.stock === 0"
              class="flex items-center justify-center w-10 h-10 rounded-xl bg-indigo-50 dark:bg-gray-800 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-600 hover:text-white dark:hover:bg-indigo-500 dark:hover:text-white transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
      </button>
    </div>
  </div>
</div>
